# Codemagic CI — builds Rally for iOS on a cloud Mac and ships to TestFlight /
# App Store Connect. No local Mac required. See APP_STORE.md for the one-time
# setup (Apple Developer account, App Store Connect API key, signing).
#
# Before this runs you must, in the Codemagic UI:
#   1. Connect this GitHub repo.
#   2. Add an App Store Connect API key integration (Teams → Integrations) and
#      note its reference name — put it under integrations.app_store_connect.
#   3. Enable automatic code signing (Codemagic manages certs/profiles via that
#      API key). Make sure the bundle id below matches your App Store Connect app.
workflows:
  ios-release:
    name: Rally iOS release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicAppStoreKey   # <-- name of your API-key integration
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.danbaldauf.rally   # <-- must match App Store Connect
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.danbaldauf.rally"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build the web app (Vite -> dist)
        script: npm run build
      - name: Generate & sync the iOS project
        script: |
          # The ios/ folder is not committed; generate it fresh on the Mac.
          npx cap add ios || npx cap sync ios
          npx cap copy ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set build number from Codemagic counter
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER" || true
      - name: Apply signing profiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Flip to true once you're ready to push a build to App Store review:
        # submit_to_app_store: false
