name: iOS → TestFlight

# Builds Rally for iOS on a GitHub-hosted macOS runner and uploads to
# TestFlight. Uses App Store Connect API-key "cloud signing" — no Mac, no
# fastlane, no separate certificate repo. See APP_STORE.md for the required
# repository secrets.
#
# Trigger: run manually from the Actions tab, or push a tag like ios-v1.0.0.
on:
  workflow_dispatch:
  push:
    tags:
      - 'ios-v*'

jobs:
  build:
    # macOS 15 carries Xcode 26, whose iOS 26 SDK Apple now requires for uploads.
    runs-on: macos-15
    timeout-minutes: 60
    env:
      KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        # Apple requires the iOS 26 SDK; pick the newest Xcode 26 if present,
        # otherwise the newest available, and log the SDK for confirmation.
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1); fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos || true

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11 (matches the committed lockfile) and satisfies
          # @capacitor/cli's node >=22 engine requirement.
          node-version: 24
          cache: npm

      - name: Install dependencies
        # Use install (not ci) so cross-platform optional-dep drift in the
        # lockfile (e.g. sharp's native bindings) can't hard-fail the build.
        run: npm install

      - name: Build web app (Vite → dist)
        run: npm run build

      - name: Generate iOS project
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Patch generated AppDelegate (drop unused Universal Links handler)
        # The 8.3.4 template's application(_:continue:restorationHandler:) call
        # does not compile against the SPM-resolved Capacitor framework. Rally
        # does not use Universal Links, so replace AppDelegate with our version.
        run: cp ci/ios/AppDelegate.swift ios/App/App/AppDelegate.swift

      - name: Register the rally:// URL scheme
        # The Share Extension hands the shared link back to the app via
        # rally://share?url=…; register the scheme on the regenerated app plist.
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.danbaldauf.rally.share" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string rally" "$PLIST"

      - name: Inject Share Extension target
        # /ios is regenerated each build, so the extension target is added to the
        # generated .xcodeproj here (sources live in ci/ios/ShareExtension/).
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          EXT_BUNDLE_ID: com.danbaldauf.rally.ShareExtension
        run: |
          # xcodeproj ships with the runner's preinstalled CocoaPods; install is
          # a best-effort upgrade and must not fail the build if it's already there.
          sudo gem install xcodeproj --no-document || gem install xcodeproj --no-document || true
          ruby ci/ios/add-share-extension.rb

      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cat > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 <<'APPLE_KEY_EOF'
          ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APPLE_KEY_EOF

      - name: Revoke stale signing certificates
        # Ephemeral runners can't reuse certs across builds, so clear the
        # account first to stay within Apple's per-account certificate limit.
        run: P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" node ci/revoke-signing-certs.mjs

      - name: Provision distribution signing
        # Create our own distribution certificate + App Store provisioning
        # profile via the API and load them into a temporary keychain, so the
        # build signs manually (cloud-managed signing isn't available to us).
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/signing"
          mkdir -p "$OUT"

          # Private key + certificate signing request.
          openssl req -new -newkey rsa:2048 -nodes \
            -keyout "$OUT/dist.key" -out "$OUT/dist.csr" \
            -subj "/CN=Rally Distribution/O=Rally/C=US"

          # Certificate + App Store profiles (app + Share Extension) from
          # App Store Connect. One cert signs both bundle ids.
          OUT_DIR="$OUT" CSR_PATH="$OUT/dist.csr" BUNDLE_ID="com.danbaldauf.rally" \
            EXT_BUNDLE_ID="com.danbaldauf.rally.ShareExtension" \
            P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" \
            node ci/create-signing-assets.mjs
          PROFILE_UUID="$(cat "$OUT/PROFILE_UUID")"
          EXT_PROFILE_UUID="$(cat "$OUT/EXT_PROFILE_UUID")"

          # Bundle key + cert into a .p12 (try OpenSSL 3 -legacy, else LibreSSL).
          openssl x509 -inform DER -in "$OUT/dist.cer" -out "$OUT/dist.pem"
          P12_PASS="$(openssl rand -base64 24)"
          openssl pkcs12 -export -legacy -inkey "$OUT/dist.key" -in "$OUT/dist.pem" \
            -out "$OUT/dist.p12" -passout pass:"$P12_PASS" 2>/dev/null \
          || openssl pkcs12 -export -inkey "$OUT/dist.key" -in "$OUT/dist.pem" \
            -out "$OUT/dist.p12" -passout pass:"$P12_PASS"

          # Dedicated keychain holding the signing identity.
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KC_PASS="$(openssl rand -base64 24)"
          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"
          security import "$OUT/dist.p12" -P "$P12_PASS" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KC_PASS" "$KEYCHAIN" >/dev/null

          # Install both provisioning profiles where Xcode looks for them.
          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          cp "$OUT/profile.mobileprovision" "$PROFILES/$PROFILE_UUID.mobileprovision"
          cp "$OUT/profile-ext.mobileprovision" "$PROFILES/$EXT_PROFILE_UUID.mobileprovision"

          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Set build number
        run: |
          cd ios/App
          agvtool new-version -all ${{ github.run_number }} || true

      - name: Archive
        # Archive unsigned; signing happens at export with our manual identity.
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.danbaldauf.rally</key><string>$PROFILE_NAME</string>
              <key>com.danbaldauf.rally.ShareExtension</key><string>$EXT_PROFILE_NAME</string>
            </dict>
            <key>destination</key><string>export</string>
          </dict></plist>
          EOF
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -f "$RUNNER_TEMP"/export/*.ipa -t ios \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"

      - name: Save IPA as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rally-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
